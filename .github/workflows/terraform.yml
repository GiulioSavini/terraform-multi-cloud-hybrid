name: "Terraform CI/CD"

on:
  pull_request:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "environments/**"
      - "modules/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.9.0"
  TF_LOG: ""
  INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.changes.outputs.environments }}
    steps:
      - uses: actions/checkout@v5
      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dev:
              - 'environments/dev/**'
              - 'modules/**'
            stg:
              - 'environments/stg/**'
              - 'modules/**'
            prd:
              - 'environments/prd/**'
              - 'modules/**'

  terraform-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    runs-on: ubuntu-latest
    needs: [terraform-fmt]
    strategy:
      matrix:
        environment: [dev, stg, prd]
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: environments/${{ matrix.environment }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/${{ matrix.environment }}

  security-scan:
    runs-on: ubuntu-latest
    needs: [terraform-validate]
    steps:
      - uses: actions/checkout@v5

      - name: Run Trivy (IaC scan)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: 0
          format: table

      - name: Run Checkov
        run: |
          pip install -q checkov
          checkov -d . --quiet --compact --soft-fail \
            --framework terraform \
            --output cli \
            || true

  infracost:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [terraform-validate]
    strategy:
      matrix:
        environment: [dev, stg, prd]
    steps:
      - uses: actions/checkout@v5
      - uses: infracost/actions/setup@v3
        with:
          api-key: ${{ env.INFRACOST_API_KEY }}
      - name: Generate Infracost breakdown
        run: |
          infracost breakdown \
            --path environments/${{ matrix.environment }} \
            --format json \
            --out-file /tmp/infracost-${{ matrix.environment }}.json
      - name: Post Infracost comment
        run: |
          infracost comment github \
            --path /tmp/infracost-${{ matrix.environment }}.json \
            --repo $GITHUB_REPOSITORY \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --pull-request ${{ github.event.pull_request.number }} \
            --behavior update \
            --tag ${{ matrix.environment }}

  terraform-plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    needs: [security-scan]
    strategy:
      matrix:
        environment: [dev, stg, prd]
    environment: ${{ matrix.environment }}-plan
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -var-file=terraform.tfvars -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "plan_exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        working-directory: environments/${{ matrix.environment }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('environments/${{ matrix.environment }}/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan - \`${{ matrix.environment }}\`\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: environments/${{ matrix.environment }}/tfplan

  terraform-apply:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.CLOUD_CREDENTIALS_CONFIGURED == 'true'
    needs: [security-scan]
    strategy:
      max-parallel: 1
      matrix:
        environment: [dev, stg, prd]
    environment: ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: GCP Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Terraform Init
        run: terraform init
        working-directory: environments/${{ matrix.environment }}

      - name: Terraform Apply
        run: terraform apply -var-file=terraform.tfvars -auto-approve
        working-directory: environments/${{ matrix.environment }}
