#cloud-config
package_update: true
package_upgrade: true

packages:
  - nginx
  - openssl
  - jq
  - curl

write_files:
  - path: /etc/nginx/conf.d/default.conf
    content: |
      server {
          listen 80;
          server_name _;
          return 301 https://$host$request_uri;
      }

      server {
          listen 443 ssl http2;
          server_name _;

          ssl_certificate /etc/nginx/ssl/server.crt;
          ssl_certificate_key /etc/nginx/ssl/server.key;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers HIGH:!aNULL:!MD5;
          ssl_prefer_server_ciphers on;

          add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
          add_header X-Content-Type-Options "nosniff" always;
          add_header X-Frame-Options "DENY" always;

          location / {
              root /var/www/html;
              index index.html;
          }

          location /health {
              access_log off;
              return 200 '{"status":"healthy","cloud":"azure"}';
              add_header Content-Type application/json;
          }
      }

  - path: /var/www/html/index.html
    content: |
      <!DOCTYPE html>
      <html>
      <head><title>Azure - Hybrid Landing Zone</title></head>
      <body>
      <h1>Azure VM Scale Set</h1>
      <p>Cloud: Azure</p>
      <p>Managed by Terraform</p>
      </body>
      </html>

runcmd:
  - mkdir -p /etc/nginx/ssl
  - openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/nginx/ssl/server.key -out /etc/nginx/ssl/server.crt -subj "/C=IT/ST=Italy/L=Milan/O=HybridLZ/CN=$(hostname)"
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl enable nginx
  - systemctl restart nginx
